enabled = true;
type = "ollama"; # Using Ollama provider

# Ensemble approach - runs both models in parallel for consensus
model = ["qwen2.5:7b", "gemma3:4b"];

# How ensemble works:
# - Both models evaluate the message simultaneously
# - If majority says spam (>0.75), uses highest spam score
# - If majority says ham (<0.25), uses lowest ham score
# - No consensus = no GPT symbol added

temperature = 0.1;
max_tokens = 300;
timeout = 45s;

# Simplified prompt - let the built-in parser handle the response format
# The model should naturally provide a spam probability and reason
prompt = "Analyze this email for security threats.\nAssessment criteria: Sender legitimacy, phishing tone, and URL safety.\n\nOutput format:\nScore: [0.0 to 1.0]\nReason: [Brief explanation]\nClass: [phishing/scam/malware/marketing/none]\n\nDo not include an intro or outro.";

url = "http://ollama.ai.svc.cluster.local:11434/v1/chat/completions";

# Original settings - skip obvious cases (COMMENTED FOR TRIAL)
# allow_passthrough = false;
# allow_ham = false;
# symbols_to_except = {
#   BAYES_SPAM = 0.9;
#   WHITELIST_SPF = -1.0;
# };

# Trial settings - check ALL messages including passthrough and ham
allow_passthrough = true;
allow_ham = true;
# No symbol exceptions - GPT will evaluate everything

# Use plain-text responses (better quality per docs)
json = false;

# Add reason to message headers for debugging
reason_header = "X-GPT-Reason";

# Redis cache settings
cache_prefix = "rsllm";
