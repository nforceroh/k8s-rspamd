# /etc/rspamd/local.d/metadata_exporter.conf

allow_proxy_worker = true;

rules {
  MAILGALLOWS_INGEST {
    backend = "http";
    url = "http://${MAILGALLOWS_HOST}:${MAILGALLOWS_PORT}/quarantine";
    # selector = "is_reject";
    # --- STEP 1: Route task through a dedicated custom selector ---
    selector = "gallows_bypass";
    formatter = "multipart";
    timeout = 5;
    defer = false;
  }
}

# --- STEP 2: Inject the custom hook mechanism down below ---
custom_select {
  gallows_bypass = <<EOD
return function(task)
     -- Forcefully allocate logging and state metrics
     local rspamd_logger = require "rspamd_logger"
     rspamd_logger.infox(task, "MAILGALLOWS RUNTIME FORCE TRACE: Triggering ingest block manually")
     
     -- Always return true to ensure metadata payload packaging fires unconditionally
     return true
end
EOD;
}