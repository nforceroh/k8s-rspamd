# /etc/rspamd/local.d/metadata_exporter.conf

rules {
  # Define the unique identifier path hook for MailGallows
  MAILGALLOWS_INGEST {
    backend = "http";

    # Target endpoint routing URL mapping directly to your Flask port 5000 API route
    url = "http://mailgallows-svc:5000/quarantine";

    # Condition filter: Trigger metadata transfer ONLY when Rspamd rules demand a 'reject' action
    selector = "is_reject";

    # Format payload layout structural data as raw email text
    formatter = "default";

    # CRITICAL: Forces Rspamd to explicitly translate execution variables (Message-ID, Queue-ID, Score, etc.) 
    # into standardized X-Rspamd-* HTTP Headers for our Python ingestion daemon to extract
    meta_headers = true;
  }
}
