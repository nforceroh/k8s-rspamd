# ==============================================================================
# MX Check composites
MX_IMPLICIT {
  expression = "MX_GOOD & MX_MISSING";
  score = -0.01;
}

# Virus detection composites
VIRUS_FOUND {
  expression = "CLAM_VIRUS";
  score = 100.0;
}

# Freemail composites
FREEMAIL_POLICY_FAILURE {
  expression = "FREEMAIL_FROM & !DMARC_POLICY_ALLOW & !MAILLIST & !WHITELISTED_FWD_HOST & -g+:policies";
  score = 16.0;
}

FREEMAIL_TO_UNDISC_RCPT {
  expression = "FREEMAIL_FROM & ( MISSING_TO | R_UNDISC_RCPT | TO_EQ_FROM )";
  score = 5.0;
}

# Content filter composites
BAD_WORD_BAD_TLD {
  expression = "( NFORCER_FISHY_TLD_LOW | NFORCER_FISHY_TLD_MED | NFORCER_FISHY_TLD_HIGH ) & ( MB_SPAM_WORDS | MB_SPAMPHRASES_BODY | SENSITIVE_KEYWORDS )";
  score = 10.0;
}

# Policy and authentication composites
FORGED_W_BAD_POLICY {
  expression = "( -g+:policies | -R_SPF_NA) & ( ~FROM_NEQ_ENVFROM | ~FORGED_SENDER ) & !WHITELISTED_FWD_HOST & !DMARC_POLICY_ALLOW";
  score = 3.0;
}

SPOOFED_UNAUTH {
  expression = "!RSPAMD_HOST & !SIEVE_HOST & !WHITELISTED_FWD_HOST & -g+:policies";
  score = 50.0;
}

WL_FWD_HOST {
  expression = "-WHITELISTED_FWD_HOST & (^g+:rbl | ^g+:policies | ^g+:hfilter | ^g:neural)";
  score = -5.0;
}

UPSTREAM_CHECKS_EXCLUDE_FWD_HOST {
  expression = "(-SIEVE_HOST | -WHITELISTED_FWD_HOST) & (^UNITEDINTERNET_SPAM | ^SPAM_FLAG | ^KLMS_SPAM | ^AOL_SPAM | ^MICROSOFT_SPAM)";
  score = 0.0;
}

# Macro and attachment composites
# Fuzzy and Bayes mismatch composites
BOUNCE_FUZZY {
  expression = "-BOUNCE & ^g+:fuzzy";
  score = 0.0;
}

FUZZY_HAM_MISMATCH {
  expression = "( -FUZZY_DENIED | -RSPAMDIO_FUZZY_DENIED | -LOCAL_FUZZY_DENIED ) & ( ^BAYES_HAM | ^NEURAL_HAM_LONG | ^NEURAL_HAM_SHORT )";
  score = 0.0;
}

FUZZY_SPAM_MISMATCH {
  expression = "( -LOCAL_FUZZY_WHITE ) & ( ^BAYES_SPAM | ^NEURAL_SPAM_LONG | ^NEURAL_SPAM_SHORT )";
  score = 0.0;
}

# Encrypted chat composite
ENCRYPTED_CHAT {
  expression = "CHAT_VERSION_HEADER & ENCRYPTED_PGP";
  score = -20.0;
}