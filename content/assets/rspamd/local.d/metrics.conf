# Show all symbols including zero-score ones
extended_urls = true;

# Include actions configuration
actions {
  .include(try=true,priority=1,duplicate=merge) "$CONFDIR/local.d/actions.conf"
}

subject = "*** SPAM *** %s";

symbols {
	"PHISHING_DATABASE" {
		description = "Matched external phishing database";
		score = 8.0;
	}
	
	# --- Custom Hardening Adjustments ---
	"DMARC_POLICY_SOFTFAIL" {
		description = "DMARC policy softfail";
		score = 2.5;
	}
	"RDNS_NONE" {
		description = "No reverse DNS record found";
		score = 4.0;
	}
	"HFILTER_HELO_BAREIP" {
		description = "HELO argument is a raw IP address";
		score = 4.5;
	}
	"HFILTER_HOSTNAME_UNKNOWN" {
		description = "Unknown hostname in HELO/EHLO";
		score = 3.5;
	}
	"SUBJECT_ENDS_EXCLAIM" {
		description = "Subject ends with an exclamation mark";
		score = 1.0;
	}
	"BITCOIN_ADDR" {
		description = "Message contains a Bitcoin wallet address";
		score = 3.0;
	}
}

group "bayes" {
	symbol "BAYES_SPAM" {
		weight = 7.5;
		description = "Message probably spam, probability: ";
	}
	symbol "BAYES_HAM" {
		weight = -2.5;
		description = "Message probably ham, probability: ";
	}
}

symbol "MIME_BASE64_TEXT" {
  score = 2.5;
  description = "Penalize obfuscated text parts";
}

symbol "MAILLIST" {
  weight = 4.0;
  description = "Message sent via a mailing list";
}
