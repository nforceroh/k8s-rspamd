# Show all symbols including zero-score ones
extended_urls = true;

# Include actions configuration
.include(try=true,priority=1,duplicate=merge) "$LOCAL_CONFDIR/local.d/actions.conf"

subject = "*** SPAM *** %s";
symbols {
  "MAILCOW_AUTH" {
    description = "mailcow authenticated";
    score = -20.0;
  }
	"PHISHING_DATABASE" {
		description = "Matched external phishing database";
		score = 8.0;
	}
  "ENCRYPTED_CHAT" {
    score = -20.0;
  }
}

group "bayes" {
	symbol "BAYES_SPAM" {
		weight = 7.5;
		description = "Message probably spam, probability: ";
	}
	symbol "BAYES_HAM" {
		weight = -2.5;
		description = "Message probably ham, probability: ";
	}
}
group "MX" {
	symbol "MX_INVALID" {
	  score = 0.5;
	  description = "No connectable MX";
	  one_shot = true;
	}
	symbol "MX_MISSING" {
	  score = 2.0;
	  description = "No MX record";
	  one_shot = true;
	}
	symbol "MX_GOOD" {
	  score = -0.01;
	  description = "MX was ok";
	  one_shot = true;
	}
}
symbol "MIME_BASE64_TEXT" {
  score = 2.5;
  description = "Penalize obfuscated text parts";
}