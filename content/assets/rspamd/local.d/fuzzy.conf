# Fuzzy hashing module configuration
# https://rspamd.com/doc/modules/fuzzy_check.html

# Main settings
enabled = true;
mime_types = ["application/pdf", "text/html", "text/plain", "text/x-diff"];
text_format = true;
skip_unknown = true;

# Fuzzy rules - connect to fuzzy storage
rule "rspamd.io" {
  servers = "127.0.0.1:11335";
  db_prefix = 1;
  default_weight = 1;
  symbol = "FUZZY_DENIED";
  fuzzy_map = {
    1 = 5.0;       # Generic phishing
    2 = 7.0;       # Obfuscated phishing
    3 = 9.0;       # Image phishing  
    4 = 4.0;       # Spam/marketing
    5 = 3.0;       # Malware/botnet
  }
  mime_types = ["application/pdf", "text/html", "text/plain"];
}

# Local fuzzy storage configuration
rule "local" {
  local = true;
  db_prefix = 0;
  default_weight = 2;
  symbol = "LOCAL_FUZZY_DENIED";
  fuzzy_map = {
    1 = 10.0;      # Local phishing
    2 = 12.0;      # Local malware
    3 = 8.0;       # Local spam
  }
  read_only = false;
}

# Whitelist for fuzzy hashes
rule "rspamd.io_whitelist" {
  servers = "127.0.0.1:11335";
  db_prefix = 2;
  default_weight = 1;
  symbol = "LOCAL_FUZZY_WHITE";
  action = "no action";
  read_only = true;
}

# Hash settings
hash_alg = "blake2";
min_bytes = 50;
