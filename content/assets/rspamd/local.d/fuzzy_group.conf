# Fuzzy check symbol group scoring
# /etc/rspamd/local.d/fuzzy_group.conf

max_score = 12.0;

symbols = {
  "FUZZY_DENIED" {
    weight = 12.0;
    description = "Rspamd.io denied fuzzy hash";
  }
  "FUZZY_PROBABLE" {
    weight = 5.0;
    description = "Rspamd.io probable spam fuzzy hash";
  }
  "LOCAL_FUZZY_DENIED" {
    weight = 12.0;
    description = "Local denied fuzzy hash";
  }
  "LOCAL_FUZZY_PROB" {
    weight = 5.0;
    description = "Local probable spam fuzzy hash";
  }
  "LOCAL_FUZZY_WHITE" {
    weight = -2.0;
    description = "Local whitelisted fuzzy hash";
  }
}
