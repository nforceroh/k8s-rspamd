# Personal Multimap configuration
NFORCER_BL_ASN {
  type = "asn";
  map = "https://raw.githubusercontent.com/nforceroh/rspamd_config/main/maps.d/nforcer/nforcer_bad_asn.map";
  score = 2.0;
  description = "Sender's ASN is on the local blacklist";
}

NFORCER_BAD_COUNTRY {
  type = "selector";
  selector = 'countries';
  map = "https://raw.githubusercontent.com/nforceroh/rspamd_config/main/maps.d/nforcer/nforcer_bad_country.map";
  symbols_set = [
    "COUNTRY_FILTER"
  ];
  description = "Sender's email is from a bad country";
  score = 2.0;
}

NFORCER_BAD_LANG {
  type = "selector";
  selector = 'languages';
  map = "https://raw.githubusercontent.com/nforceroh/rspamd_config/main/maps.d/nforcer/nforcer_bad_languages.map";
  symbols_set = [
    "LANG_FILTER"
  ];
  regexp = true;
  description = "Sender's email has a bad language";
  score = 5.0;
}

NFORCER_FISHY_TLD_LOW {
  type = "from";
  filter = "email:domain";
  map = "https://raw.githubusercontent.com/nforceroh/rspamd_config/main/maps.d/nforcer/nforcer_fishy_tlds_low.map";
  regexp = true;
  symbol = "NFORCER_FISHY_TLD_LOW";
  score = 2;
  description = "Sender domain matches lower-confidence fishy TLD/domain patterns";
}

NFORCER_FISHY_TLD_MED {
  type = "from";
  filter = "email:domain";
  map = "https://raw.githubusercontent.com/nforceroh/rspamd_config/main/maps.d/nforcer/nforcer_fishy_tlds_med.map";
  regexp = true;
  symbol = "NFORCER_FISHY_TLD_MED";
  score = 5;
  description = "Sender domain matches medium-confidence fishy TLD/domain patterns";
}

NFORCER_FISHY_TLD_HIGH {
  type = "from";
  filter = "email:domain";
  map = "https://raw.githubusercontent.com/nforceroh/rspamd_config/main/maps.d/nforcer/nforcer_fishy_tlds_high.map";
  regexp = true;
  symbol = "NFORCER_FISHY_TLD_HIGH";
  score = 10;
  description = "Sender domain matches high-confidence fishy TLD/domain patterns";
}


NFORCER_FROM_WL {
  type = "from";
  filter = "email:addr";
  map = "https://raw.githubusercontent.com/nforceroh/rspamd_config/main/maps.d/nforcer/nforcer_from_wl.map";
  #regexp = true;
  action = "accept";
  description = "Accept emails from";
  group = "local_nforcer";
}

NFORCER_FROM_BL {
  type = "from";
  filter = "email:addr";
  map = "https://raw.githubusercontent.com/nforceroh/rspamd_config/main/maps.d/nforcer/nforcer_from_bl.map";
  #regexp = true;
  action = "reject";
  description = "Reject emails from";
  group = "local_nforcer";
}

NFORCER_DOMAIN_WL {
  type = "from";
  filter = "email:domain";
  map = "https://raw.githubusercontent.com/nforceroh/rspamd_config/main/maps.d/nforcer/nforcer_domain_wl.map";
  regexp = true;
  score = -20.0;
  action = "accept";
  description = "Accept emails from";
  group = "local_nforcer";
}

NFORCER_DOMAIN_BL {
  type = "from";
  filter = "email:domain";
  map = "https://raw.githubusercontent.com/nforceroh/rspamd_config/main/maps.d/nforcer/nforcer_domain_bl.map";
  regexp = true;
  prefilter = true;
  score = 20.0;
  action = "reject";
  description = "Reject emails from";
  group = "local_nforcer";
}
