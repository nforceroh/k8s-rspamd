SUSPICIOUS_MAILERS {
  type = "header";
  header = "X-Mailer";
  map = [
    "/Mass Mailer/i",
    "/Bulk.*Mail/i", 
    "/spam/i"
  ];
  regexp = true;
  description = "Suspicious mail clients";
}

FORGED_OUTLOOK {
  type = "header";
  header = "From";
  map = [
    "/from:.*[@\\.]outlook\\.com/i",
    "/from:.*[@\\.]hotmail\\.com/i", 
    "/from:.*[@\\.]live\\.com/i"
  ];
  regexp = true;
  description = "Checks if sender claims to be from major email providers";
}

BULK_MAIL_HEADERS {
  type = "header";
  header = "Precedence";
  map = [
    "bulk",
    "list",
    "junk"
  ];
  description = "Bulk mail precedence headers";
}

SUSPICIOUS_ATTACHMENTS {
  type = "filename";
  filter = "extension";
  map = [
    "exe",
    "scr",
    "bat", 
    "com",
    "pif"
  ];
  description = "Dangerous file extensions";
}

ARCHIVE_WITH_EXE {
  type = "filename";
  filter = "full";
  map = [
    "/.*\\.zip:.*\\.exe$/i",
    "/.*\\.rar:.*\\.scr$/i"
  ];
  regexp = true;
  description = "Archive containing executable";
}

SUSPICIOUS_SHORTENERS {
  type = "url";
  filter = "host";
  map = [
    "bit.ly",
    "tinyurl.com", 
    "goo.gl",
    "t.co"
  ];
  description = "URL shortener services";
}

SENSITIVE_KEYWORDS {
  type = "content";
  filter = "text";
  map = [
    "/\\bssn\\b/i",
    "/\\b\\d{3}-\\d{2}-\\d{4}\\b/",
    "/\\bcredit card\\b/i",
    "/\\bpassword\\b/i"
  ];
  regexp = true;
  description = "Contains sensitive information";
}