name: Cleanup old GHCR images

on:
  schedule:
    - cron: "17 3 * * 0"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Preview deletions only"
        required: false
        default: "true"

jobs:
  cleanup-ghcr:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Get image name
        run: echo "IMAGE_NAME=$(echo ${{ github.repository }} | cut -d'/' -f2)" >> "$GITHUB_ENV"

      - name: Cleanup old image versions
        uses: snok/container-retention-policy@v3
        with:
          account: ${{ github.repository_owner }}
          token: ${{ secrets.GITHUB_TOKEN }}
          image-names: ${{ env.IMAGE_NAME }}
          cut-off: 30d
          keep-at-least: 5
          skip-tags: latest
          dry-run: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run == 'true' }}