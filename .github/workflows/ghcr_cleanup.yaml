name: Cleanup old GHCR images

on:
  push:
    branches:
      - main
  schedule:
    - cron: "17 3 * * 0"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Preview deletions only"
        required: false
        default: "true"

jobs:
  cleanup-ghcr:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Get image name
        run: echo "IMAGE_NAME=$(echo ${{ github.repository }} | cut -d'/' -f2)" >> "$GITHUB_ENV"

      - name: Dry run mode
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run == 'true' }}
        run: echo "Dry run enabled. Skipping deletion."

      - name: Cleanup old image versions
        if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.dry_run != 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OWNER: ${{ github.repository_owner }}
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
          KEEP_UNTAGGED: "5"
        run: |
          set -euo pipefail

          org_endpoint="/orgs/${OWNER}/packages/container/${IMAGE_NAME}/versions"
          user_endpoint="/users/${OWNER}/packages/container/${IMAGE_NAME}/versions"
          endpoint=""

          if gh api --silent --paginate "${org_endpoint}?per_page=100" | jq -s 'add' > /tmp/ghcr_versions.json 2>/dev/null; then
            endpoint="$org_endpoint"
          elif gh api --silent --paginate "${user_endpoint}?per_page=100" | jq -s 'add' > /tmp/ghcr_versions.json 2>/dev/null; then
            endpoint="$user_endpoint"
          else
            echo "Unable to list package versions for ${OWNER}/${IMAGE_NAME}" >&2
            exit 1
          fi

          total_versions=$(jq 'length' /tmp/ghcr_versions.json)
          echo "Found ${total_versions} total versions for ${OWNER}/${IMAGE_NAME}"

          mapfile -t delete_ids < <(
            jq -r --argjson keep "$KEEP_UNTAGGED" '
              [ .[]
                | select(((.metadata.container.tags // []) | length) == 0)
              ]
              | sort_by(.created_at)
              | reverse
              | .[$keep:]
              | .[].id
            ' /tmp/ghcr_versions.json
          )

          if [[ ${#delete_ids[@]} -eq 0 ]]; then
            echo "No untagged versions to delete after keeping ${KEEP_UNTAGGED}."
            exit 0
          fi

          echo "Deleting ${#delete_ids[@]} untagged versions (keeping newest ${KEEP_UNTAGGED})."
          for version_id in "${delete_ids[@]}"; do
            echo "Deleting version id: ${version_id}"
            gh api --method DELETE "${endpoint}/${version_id}"
          done